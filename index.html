    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_POSTS = [
            {
                id: "post-1",
                title: "Deconstructing Zero-Day Exploit Chains in Cloud Environments",
                category: "Vulnerabilities",
                readTime: "7 min read",
                date: "2026-07-20",
                author: "Alex Rivers // Lead SecResearcher",
                summary: "An in-depth technical walkthrough on how chained vulnerabilities in IAM roles can lead to unauthorized full-cluster compromise.",
                content: `### Executive Summary\nCloud security misconfigurations continue to be the leading vector for high-impact infrastructure breaches. In this article, we analyze an attack path combining weak IAM policy evaluations and SSRF in internal sidecar proxies.\n\n### The Attack Chain\n1. **Initial Access**: Exploiting an unpatched SSRF vulnerability in the public web frontend.\n2. **Metadata Endpoint Querying**: Bypassing IP-filtering via host-header injection.\n3. **Token Extraction**: Retrieving temporary STS security credentials.\n4. **Privilege Escalation**: Utilizing misconfigured wildcard actions \`s3:*\` to dump sensitive customer databases.\n\n\`\`\`bash\n# Simulated SSRF Request payload\ncurl -H "X-Forwarded-For: 169.254.169.254" http://vulnerable-app.internal/proxy?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/AdminRole\n\`\`\`\n\n### Remediation Strategies\n- Enable **IMDSv2** on all AWS EC2 instances requiring session tokens.\n- Implement strict **Least Privilege** policies using IAM Access Analyzer.\n- Monitor network egress for anomalous IP queries targeting cloud metadata APIs.`,
                tags: ["Cloud Security", "AWS", "IAM", "Exploit Analysis"],
                likes: 142,
                comments: [
                    { id: "c-101", author: "CyberNaut_99", text: "Super detailed explanation of IMDSv2 vs IMDSv1 mitigation!", date: "2026-07-21 10:30" },
                    { id: "c-102", author: "DevOps_Dan", text: "We actually faced something similar last month. Wildcards in IAM are dangerous.", date: "2026-07-21 14:15" }
                ]
            },
            {
                id: "post-2",
                title: "Modern Ransomware Tactics: Evasion via Process Hollowing",
                category: "Malware Analysis",
                readTime: "12 min read",
                date: "2026-07-18",
                author: "Elena Rostova // Reverse Engineer",
                summary: "Analyzing recent malware samples that hijack legitimate OS processes to evade Endpoint Detection & Response (EDR) agents.",
                content: `### Overview\nProcess hollowing is a code injection technique where a legitimate process image is unmapped and overwritten with malicious executable code.\n\n### Step-by-Step Injection Mechanics\n- **Step 1**: Spawn a benign target process (e.g., \`svchost.exe\`) in a suspended state using \`CREATE_SUSPENDED\` flags.\n- **Step 2**: Unmap the process memory headers using \`NtUnmapViewOfSection\`.\n- **Step 3**: Allocate virtual memory buffer within the target process using \`VirtualAllocEx\`.\n- **Step 4**: Write the payload code into the newly allocated space using \`WriteProcessMemory\`.\n- **Step 5**: Resume the primary thread via \`ResumeThread\` to execute payload under trusted process token.\n\n### Detection & Threat Hunting\nBehavioral EDRs detect this pattern by correlating parent-child creation trees with unmapped section execution memory protections.`,
                tags: ["Malware", "Reverse Engineering", "Windows Internals", "EDR Bypasses"],
                likes: 89,
                comments: [
                    { id: "c-201", author: "SecurityGeek", text: "Great breakdown! YARA rules for this pattern would be awesome.", date: "2026-07-19 09:05" }
                ]
            },
            {
                id: "post-3",
                title: "Securing OAuth 2.0 & PKCE Implementation in SPA Web Applications",
                category: "Web Security",
                readTime: "5 min read",
                date: "2026-07-12",
                author: "Marcus Vance // Application Security Engineer",
                summary: "Why implicit grant flow is dead and how to properly configure Proof Key for Code Exchange (PKCE) in modern React/Vue applications.",
                content: `### Why Implicit Grant Flow is Deprecated\nOAuth 2.0 implicit grant returns access tokens directly in the URL hash fragment, exposing tokens to browser access logs, history, and referrer headers.\n\n### How PKCE Prevents Authorization Code Hijacking\n1. Client generates a cryptographic random string called \`code_verifier\`.\n2. Client hashes it using SHA-256 to create the \`code_challenge\`.\n3. Client sends challenge with initial authorization request.\n4. When exchanging code for access token, client presents the original \`code_verifier\`. The server verifies compliance before token generation.`,
                tags: ["OAuth2", "Web Security", "Authentication", "React"],
                likes: 215,
                comments: []
            }
        ];

        const CATEGORIES = ["All", "Vulnerabilities", "Malware Analysis", "Web Security", "Cloud Security", "CTF & Tutorials"];

        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3500);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'error' ? 'bg-rose-950/90 border-rose-500 text-rose-200' : 'bg-emerald-950/90 border-emerald-500 text-emerald-200';

            return (
                <div className={`fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl border backdrop-blur-md shadow-2xl transition-all duration-300 ${bgColor}`}>
                    <i className={`fas ${type === 'error' ? 'fa-exclamation-circle text-rose-400' : 'fa-check-circle text-emerald-400'} text-lg`}></i>
                    <span className="text-xs sm:text-sm font-medium">{message}</span>
                    <button onClick={onClose} className="ml-2 text-slate-400 hover:text-white">
                        <i className="fas fa-times"></i>
                    </button>
                </div>
            );
        }

        function App() {
            const [posts, setPosts] = useState(() => {
                const saved = localStorage.getItem('cybersentinel_posts');
                return saved ? JSON.parse(saved) : INITIAL_POSTS;
            });

            const [userLikedPosts, setUserLikedPosts] = useState(() => {
                const saved = localStorage.getItem('cybersentinel_user_likes');
                return saved ? JSON.parse(saved) : {};
            });

            const [selectedCategory, setSelectedCategory] = useState("All");
            const [searchQuery, setSearchQuery] = useState("");
            const [activeTab, setActiveTab] = useState("blog");
            const [activePost, setActivePost] = useState(null);
            const [toast, setToast] = useState(null);
            const [isCloudActive, setIsCloudActive] = useState(false);

            // Admin State
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [adminPasscode, setAdminPasscode] = useState("");
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [showRulesModal, setShowRulesModal] = useState(false);

            // Article Authoring Form State
            const [newPost, setNewPost] = useState({
                title: "",
                category: "Vulnerabilities",
                readTime: "5 min read",
                summary: "",
                content: "",
                tags: ""
            });

            // Comment Form State
            const [commentAuthor, setCommentAuthor] = useState("");
            const [commentText, setCommentText] = useState("");

            const dbRef = useRef(null);
            const appIdRef = useRef('cyber-16cf5');

            useEffect(() => {
                localStorage.setItem('cybersentinel_posts', JSON.stringify(posts));
            }, [posts]);

            useEffect(() => {
                localStorage.setItem('cybersentinel_user_likes', JSON.stringify(userLikedPosts));
            }, [userLikedPosts]);

            useEffect(() => {
                let unsubscribe = () => {};

                const initFirebaseSync = async () => {
                    try {
                        if (!window.FirebaseModule || !window.FirebaseModule.firebaseConfig) return;

                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, getFirestore, collection, onSnapshot, appId, firebaseConfig } = window.FirebaseModule;

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);

                        dbRef.current = db;
                        appIdRef.current = appId;

                        let user = null;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            const res = await signInWithCustomToken(auth, __initial_auth_token);
                            user = res.user;
                        } else {
                            const res = await signInAnonymously(auth);
                            user = res.user;
                        }

                        if (!user) return;

                        // Mandatory Rule 1 standard path
                        const postsCol = collection(db, 'artifacts', appId, 'public', 'data', 'posts');

                        unsubscribe = onSnapshot(postsCol, (snapshot) => {
                            if (!snapshot.empty) {
                                const cloudData = snapshot.docs.map(doc => ({
                                    id: doc.id,
                                    ...doc.data()
                                }));

                                // Mandatory Rule 2: Sort in-memory descending by date
                                cloudData.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                                setPosts(cloudData);
                                setIsCloudActive(true);
                            } else {
                                // Seed initial posts if Firestore collection is empty
                                INITIAL_POSTS.forEach(async (p) => {
                                    await syncPostToCloud(db, appId, p);
                                });
                                setIsCloudActive(true);
                            }
                        }, (err) => {
                            console.warn("Firestore listener warning:", err);
                        });
                    } catch (err) {
                        console.warn("Cloud sync initialization bypassed:", err);
                    }
                };

                if (window.FirebaseModule) {
                    initFirebaseSync();
                } else {
                    window.addEventListener('firebase-ready', initFirebaseSync);
                }

                return () => {
                    window.removeEventListener('firebase-ready', initFirebaseSync);
                    unsubscribe();
                };
            }, []);

            const syncPostToCloud = async (db, appId, postData) => {
                if (!db || !window.FirebaseModule) return;
                try {
                    const { doc, setDoc } = window.FirebaseModule;
                    const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', String(postData.id));
                    await setDoc(postRef, postData, { merge: true });
                } catch (e) {
                    console.error("Cloud write exception:", e);
                }
            };

            const triggerToast = (message, type = 'success') => {
                setToast({ message, type });
            };

            const filteredPosts = useMemo(() => {
                return posts.filter(post => {
                    const matchesCategory = selectedCategory === "All" || post.category === selectedCategory;
                    const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                          post.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                          (post.tags && post.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase())));
                    return matchesCategory && matchesSearch;
                });
            }, [posts, selectedCategory, searchQuery]);

            const handleLike = async (postId, e) => {
                if (e) e.stopPropagation();

                const isAlreadyLiked = Boolean(userLikedPosts[postId]);
                const nextLikedState = !isAlreadyLiked;

                setUserLikedPosts(prev => ({ ...prev, [postId]: nextLikedState }));

                const targetPost = posts.find(p => p.id === postId);
                if (!targetPost) return;

                const newLikes = nextLikedState ? (targetPost.likes || 0) + 1 : Math.max(0, (targetPost.likes || 1) - 1);
                const updatedPost = { ...targetPost, likes: newLikes };

                setPosts(prev => prev.map(p => p.id === postId ? updatedPost : p));

                if (activePost && activePost.id === postId) {
                    setActivePost(updatedPost);
                }

                if (dbRef.current) {
                    await syncPostToCloud(dbRef.current, appIdRef.current, updatedPost);
                }

                triggerToast(nextLikedState ? "Article added to your appreciated list!" : "Like removed");
            };

            const handleAddComment = async (e) => {
                e.preventDefault();
                if (!commentAuthor.trim() || !commentText.trim()) {
                    triggerToast("Please provide both handle/name and comment text.", "error");
                    return;
                }

                const newCommentObj = {
                    id: `c-${Date.now()}`,
                    author: commentAuthor.trim(),
                    text: commentText.trim(),
                    date: new Date().toISOString().replace('T', ' ').substring(0, 16)
                };

                const currentComments = activePost.comments || [];
                const updatedComments = [newCommentObj, ...currentComments];
                const updatedPost = { ...activePost, comments: updatedComments };

                setPosts(prev => prev.map(p => p.id === activePost.id ? updatedPost : p));
                setActivePost(updatedPost);

                setCommentAuthor("");
                setCommentText("");

                if (dbRef.current) {
                    await syncPostToCloud(dbRef.current, appIdRef.current, updatedPost);
                }

                triggerToast("Comment saved and synced to database!");
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPasscode === "admin123" || adminPasscode === "cyber2026") {
                    setIsAdminLoggedIn(true);
                    setShowAuthModal(false);
                    setActiveTab("admin");
                    setAdminPasscode("");
                    triggerToast("Admin authentication verified. Publishing studio ready.");
                } else {
                    triggerToast("Access Denied: Invalid Passcode", "error");
                }
            };

            const handleCreatePost = async (e) => {
                e.preventDefault();
                if (!newPost.title || !newPost.summary || !newPost.content) {
                    triggerToast("Please complete all required fields.", "error");
                    return;
                }

                const createdPost = {
                    id: `post-${Date.now()}`,
                    title: newPost.title,
                    category: newPost.category,
                    readTime: newPost.readTime || "5 min read",
                    date: new Date().toISOString().split('T')[0],
                    author: "Admin // CyberSentinel Lead",
                    summary: newPost.summary,
                    content: newPost.content,
                    tags: newPost.tags ? newPost.tags.split(',').map(t => t.trim()).filter(Boolean) : ["Security"],
                    likes: 0,
                    comments: []
                };

                const nextPosts = [createdPost, ...posts];
                setPosts(nextPosts);

                if (dbRef.current) {
                    await syncPostToCloud(dbRef.current, appIdRef.current, createdPost);
                }

                setNewPost({
                    title: "",
                    category: "Vulnerabilities",
                    readTime: "5 min read",
                    summary: "",
                    content: "",
                    tags: ""
                });
                setActiveTab("blog");
                triggerToast("New security research briefing published globally!");
            };

            const handleDeletePost = async (postId) => {
                setPosts(prev => prev.filter(p => p.id !== postId));
                if (activePost && activePost.id === postId) setActivePost(null);

                if (dbRef.current && window.FirebaseModule) {
                    try {
                        const { doc, deleteDoc } = window.FirebaseModule;
                        const postRef = doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'posts', String(postId));
                        await deleteDoc(postRef);
                    } catch (e) {
                        console.error("Cloud delete failed:", e);
                    }
                }

                triggerToast("Article purged from database.");
            };

            return (
                <div className="flex-1 flex flex-col min-h-screen">
                    <div className="bg-slate-900 border-b border-slate-800 text-[11px] text-slate-400 py-1.5 px-4 text-center flex items-center justify-center gap-3">
                        <span className="flex items-center gap-1.5">
                            <span className={`inline-block w-2 h-2 rounded-full ${isCloudActive ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`}></span>
                            <span className="code-font text-emerald-400 font-semibold">
                                [{isCloudActive ? 'CLOUD SYNC: ACTIVE' : 'LOCAL ENGINE'}]
                            </span>
                        </span>
                        <span className="hidden sm:inline text-slate-500">|</span>
                        <span className="hidden sm:inline">Firebase Database: <span className="text-slate-300 font-mono">cyber-16cf5</span></span>
                    </div>

                    <header className="sticky top-0 z-40 bg-slate-950/85 backdrop-blur-md border-b border-slate-800/80">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setActiveTab("blog"); setActivePost(null); }}>
                                <div className="w-10 h-10 rounded-xl bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center text-emerald-400 shadow-lg shadow-emerald-500/10">
                                    <i className="fas fa-shield-halved text-xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                                        CYBER<span className="text-emerald-400 code-font">SENTINEL</span>
                                    </h1>
                                    <p className="text-[10px] text-slate-400 code-font uppercase tracking-widest">Security Research</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => { setActiveTab("blog"); setActivePost(null); }}
                                    className={`px-3.5 py-1.5 rounded-lg text-xs font-semibold transition ${activeTab === 'blog' ? 'bg-slate-800 text-emerald-400 border border-slate-700' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    <i className="fas fa-newspaper mr-2"></i>Articles

                                <button

                                    className="px-3.5 py-1.5 rounded-lg text-xs font-semibold code-font bg-slate-900 hover:bg-slate-800 text-emerald-400 border border-slate-800 hover:border-emerald-500/40 transition flex items-center gap-2"
                                >
                                    <i className="fas fa-database text-emerald-400"></i>
                                    <span className="hidden sm:inline">Firebase Setup</span>
                                </button>

                                {isAdminLoggedIn ? (
                                    <button 
                                        onClick={() => setActiveTab("admin")}
                                        className={`px-3.5 py-1.5 rounded-lg text-xs font-semibold transition flex items-center gap-2 ${activeTab === 'admin' ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40' : 'text-slate-400 hover:text-slate-200'}`}
                                    >
                                        <i className="fas fa-user-shield text-emerald-400"></i>
                                        <span>Studio</span>
                                        <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setShowAuthModal(true)}
                                        className="px-3.5 py-1.5 rounded-lg text-xs font-semibold code-font bg-slate-900 hover:bg-slate-800 text-slate-300 border border-slate-700 hover:border-slate-600 transition flex items-center gap-2"
                                    >
                                        <i className="fas fa-lock text-emerald-400"></i>
                                        <span>Admin Login</span>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    {}

                        <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                            <div className="relative rounded-2xl bg-gradient-to-br from-slate-900 via-slate-900/90 to-emerald-950/40 border border-slate-800 p-6 sm:p-10 mb-10 overflow-hidden shadow-2xl">
                                <div className="absolute top-0 right-0 -mt-12 -mr-12 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
                                <div className="relative z-10 max-w-3xl">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-medium code-font mb-4">
                                        <i className="fas fa-terminal"></i> SECURITY_INTELLIGENCE_FEED
                                    </div>
                                    <h2 className="text-2xl sm:text-4xl font-extrabold text-white tracking-tight leading-tight mb-4">
                                        Cybersecurity Insights, Vulnerability Analysis & Threat Research
                                    </h2>
                                    <p className="text-slate-400 text-sm sm:text-base leading-relaxed mb-6">
                                        Operational security briefings, malware breakdowns, and application security research.
                                    </p>
                                    
                                    <div className="relative max-w-xl">
                                        <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Search vulnerabilities, tags, topics (e.g. AWS, Malware, PKCE)..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full bg-slate-950/80 border border-slate-800 focus:border-emerald-500/60 focus:ring-1 focus:ring-emerald-500/60 text-slate-100 placeholder-slate-500 rounded-xl pl-11 pr-10 py-3 text-sm outline-none transition"
                                        />
                                        {searchQuery && (
                                            <button onClick={() => setSearchQuery("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                                                <i className="fas fa-times-circle"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 overflow-x-auto pb-4 mb-8 scrollbar-none">
                                {CATEGORIES.map(category => (
                                    <button
                                        key={category}
                                        onClick={() => setSelectedCategory(category)}
